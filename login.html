<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="login-box text-center">
        <h4 class="fw-bold mb-4">Admin Login</h4>
        <input type="password" id="p" class="form-control mb-3" placeholder="Password">
        <button onclick="go()" class="btn btn-primary w-100 fw-bold">Login</button>
    </div>
    <script>
        function go() { if(document.getElementById('p').value === "1234") window.location.href="index.html"; else alert("မှားနေတယ်ဗျ"); }
    </script>
</body>
</html>
