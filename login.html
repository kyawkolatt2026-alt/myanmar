<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to AGE VPN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .login-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .form-control { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .btn-login { background: linear-gradient(to right, #00d2ff, #3a7bd5); border: none; color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="fw-bold mb-4">AGE VPN</h2>
        <input type="text" id="u" class="form-control" placeholder="Admin Username">
        <input type="password" id="p" class="form-control" placeholder="Admin Password">
        <button onclick="login()" class="btn btn-login">CONNECT PANEL</button>
    </div>
    <script>
        function login() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            // ဒီနေရာမှာ Default admin / 1234 ထားပေးထားပါတယ်
            if(u === "admin" && p === "1234") {
                sessionStorage.setItem("login", "true");
                window.location.href = "index.html";
            } else {
                alert("Invalid Credentials!");
            }
        }
    </script>
</body>
</html>
