<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN - Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --white: #ffffff; --bg: #f4f7f6; --cyan: #00bcd4;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        #loginPage { height: 100%; background: var(--primary-grad); display: flex; justify-content: center; align-items: center; position: fixed; width: 100%; z-index: 1000; }
        .login-box { width: 350px; text-align: center; color: white; padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .input-group { background: white; border-radius: 50px; padding: 12px 25px; margin-bottom: 20px; display: flex; align-items: center; }
        .input-group input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 16px; color: #333; }
        .login-btn { background: white; color: #3a7bd5; border: none; width: 100%; padding: 14px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        #mainDashboard { display: none; padding: 25px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 15px; color: white; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; align-items: end; }
        .form-grid input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #888; font-size: 13px; border-bottom: 2px solid #f8f8f8; }
        td { padding: 15px; border-bottom: 1px solid #f8f8f8; font-size: 14px; }
        .action-btn { border: none; background: none; cursor: pointer; font-size: 18px; margin-right: 12px; }
        .edit-btn { color: #3a7bd5; }
        .del-btn { color: #ff2d55; }
        .copy-link { color: #00bcd4; text-decoration: none; font-size: 12px; cursor: pointer; font-weight: bold; border: 1px solid #00bcd4; padding: 5px 10px; border-radius: 8px; }
        .sync-status { font-size: 12px; text-align: center; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h1>AGE (Login)</h1> 
            <div class="input-group"><i class="fas fa-user" style="color:#3a7bd5"></i><input type="text" id="adminUser" placeholder="Username"></div>
            <div class="input-group"><i class="fas fa-lock" style="color:#3a7bd5"></i><input type="password" id="adminPass" placeholder="Password"></div>
            <button class="login-btn" onclick="checkLogin()">Enter Panel</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <h2 style="color:#333; margin:0;">AGE VPN Admin</h2>
            <button onclick="location.reload()" style="background:#ff2d55; color:white; border:none; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:bold;">Logout</button>
        </div>

        <div id="syncStatus" class="sync-status">Checking Cloud...</div>

        <div class="stat-grid">
            <div class="stat-card" style="background:var(--primary-grad)"><h3>Total Clients</h3><h2 id="totalU">0</h2></div>
            <div class="stat-card" style="background:linear-gradient(135deg,#ff5e7d,#ff2d55)"><h3>IP Limit</h3><h2>1 Device</h2></div> 
            <div class="stat-card" style="background:linear-gradient(135deg,#ffb347,#ff9500)"><h3>Server IP</h3><p style="font-size:14px;">157.85.103.207</p></div>
        </div>

        <div class="card">
            <h3 id="formTitle" style="margin-top:0; color:#3a7bd5;">+ Create VIP User</h3>
            <div class="form-grid">
                <div><label>Username</label><input type="text" id="username" placeholder="eg. kyawkyaw"></div>
                <div><label>Days</label><input type="number" id="days" value="30"></div>
                <div><label>Token (Optional)</label><input type="text" id="token" value="null"></div>
                <input type="hidden" id="editId">
                <button id="submitBtn" onclick="saveUser()" style="background:#00bcd4; color:white; border:none; padding:12px 25px; border-radius:10px; font-weight:bold; cursor:pointer;">Save Account</button>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th>Username</th><th>Token ID</th><th>Expiry Date</th><th>Config</th><th>Actions</th></tr></thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

<script>
    const API_URL = "https://jolly-mouse-e734.kyawkolatt2026.workers.dev"; // သင်၏ Worker URL
    const UUID = "f0c5c822-ef5b-431f-85d0-776bec0eaea7";
    const IP = "157.85.103.207";
    let users = [];
    let currentSha = "";

    function checkLogin() {
        if(document.getElementById('adminUser').value === "admin" && document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            fetchData();
        } else { alert("Login Failed!"); }
    }

    async function fetchData() {
        updateLabel("🔄 Syncing Cloud Data...", "orange");
        try {
            const res = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await res.json();
            currentSha = data.sha;
            users = JSON.parse(atob(data.content));
            render();
            updateLabel("✅ Cloud Synced", "green");
        } catch (e) { updateLabel("❌ Cloud Error! Check Worker", "red"); }
    }

    function render() {
        document.getElementById('totalU').innerText = users.length;
        document.getElementById('userTable').innerHTML = users.map(u => {
            const link = `vless://${UUID}@${IP}:80?encryption=none&security=none&type=tcp&headerType=http&host=www.speedtest.net&path=%2F#AGE-${encodeURIComponent(u.name)}`;
            return `
                <tr>
                    <td><strong>${u.name}</strong></td>
                    <td style="color:#888; font-size:12px;">${u.token}</td>
                    <td><span style="color:#3a7bd5; font-weight:bold;">${u.expiry}</span></td>
                    <td><a href="javascript:void(0)" class="copy-link" onclick="navigator.clipboard.writeText('${link}');alert('Link Copied!')">Copy Config</a></td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editUser(${u.id})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn del-btn" onclick="delUser(${u.id})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
        }).join('');
    }

    async function saveUser() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('username').value;
        const days = document.getElementById('days').value;
        const uTok = document.getElementById('token').value;
        if(!name) return alert("Name required!");

        if(id) {
            const idx = users.findIndex(u => u.id == id);
            users[idx].name = name;
            users[idx].token = uTok;
        } else {
            const exp = new Date();
            exp.setDate(exp.getDate() + parseInt(days));
            users.push({ id: Date.now(), name, token: uTok, expiry: exp.toISOString().split('T')[0], dayCount: days });
        }
        await sync();
        resetForm();
    }

    async function sync() {
        updateLabel("💾 Saving to Cloud...", "orange");
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(users, null, 2))));
        try {
            const res = await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update", content, sha: currentSha })
            });
            const d = await res.json();
            currentSha = d.content.sha;
            render();
            updateLabel("✅ Cloud Synced", "green");
        } catch (e) { updateLabel("❌ Sync Failed!", "red"); fetchData(); }
    }

    function editUser(id) {
        const u = users.find(x => x.id == id);
        document.getElementById('editId').value = u.id;
        document.getElementById('username').value = u.name;
        document.getElementById('token').value = u.token;
        document.getElementById('days').value = u.dayCount || 30;
        document.getElementById('formTitle').innerText = "Editing: " + u.name;
        document.getElementById('submitBtn').innerText = "Update Now";
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('username').value = "";
        document.getElementById('token').value = "null";
        document.getElementById('formTitle').innerText = "+ Create VIP User";
        document.getElementById('submitBtn').innerText = "Save Account";
    }

    async function delUser(id) {
        if(confirm("Delete?")) { users = users.filter(x => x.id !== id); await sync(); }
    }

    function updateLabel(t, c) {
        const l = document.getElementById('syncStatus');
        l.innerText = t; l.style.color = c;
    }
</script>
</body>
            </html>
