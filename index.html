<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN Premium Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f0c29; --grad: linear-gradient(135deg, #0f0c29, #302b63, #24243e); --accent: #00d2ff; }
        body { background: var(--grad); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-vpn { background: linear-gradient(to right, #00d2ff, #3a7bd5); border: none; color: white; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .btn-vpn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .offline { background: #ff4b2b; }
        .progress { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .progress-bar { background: var(--accent); }
        input.form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        input.form-control:focus { background: rgba(255,255,255,0.1); color: white; border-color: var(--accent); box-shadow: none; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="fas fa-shield-alt text-info me-2"></i>AGE VPN</h4>
        <div>
            <button onclick="showSettings()" class="btn btn-sm btn-outline-light me-2"><i class="fas fa-cog"></i></button>
            <button onclick="logout()" class="btn btn-sm btn-danger"><i class="fas fa-power-off"></i></button>
        </div>
    </div>

    <div class="glass-card p-4 mb-4">
        <h6 id="formTitle" class="text-info small fw-bold mb-3">CREATE NEW CLIENT</h6>
        <input type="hidden" id="editId">
        <div class="mb-3">
            <label class="small text-white-50">CLIENT NAME</label>
            <input type="text" id="username" class="form-control" placeholder="Enter name...">
        </div>
        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="small text-white-50">EXPIRED DAYS</label>
                <input type="number" id="days" class="form-control" value="30">
            </div>
            <div class="col-6">
                <label class="small text-white-50">DATA LIMIT (GB)</label>
                <input type="number" id="gb" class="form-control" value="50">
            </div>
        </div>
        <button onclick="saveUser()" id="saveBtn" class="btn btn-vpn w-100 py-2">SAVE CONNECTION</button>
        <button onclick="resetForm()" id="cancelBtn" class="btn btn-link btn-sm w-100 text-white-50 mt-2 d-none">Cancel Edit</button>
    </div>

    <div class="glass-card p-3">
        <h6 class="small fw-bold mb-3">ACTIVE CLIENTS</h6>
        <div id="userList">
            <div class="text-center py-5"><div class="spinner-border text-info"></div></div>
        </div>
    </div>
</div>

<div class="modal fade" id="settingsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-body p-4">
                <h5 class="text-info mb-4">Panel Settings</h5>
                <label class="small">New Admin Username</label>
                <input type="text" id="newAdminUser" class="form-control mb-3">
                <label class="small">New Admin Password</label>
                <input type="password" id="newAdminPass" class="form-control mb-4">
                <button onclick="updateSettings()" class="btn btn-vpn w-100">Update Settings</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://jolly-mouse-e734.kyawkolatt2026-alt.workers.dev";
    let allUsers = [];

    async function fetchUsers() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            allUsers = JSON.parse(atob(data.content));
            renderUsers();
        } catch (e) { console.error(e); }
    }

    function renderUsers() {
        const list = document.getElementById('userList');
        list.innerHTML = allUsers.map(u => {
            const expiry = new Date(u.expiry);
            const today = new Date();
            const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
            const percent = Math.max(0, Math.min(100, (diffDays / (u.dayCount || 30)) * 100));
            const statusClass = diffDays > 0 ? 'online' : 'offline';

            return `
                <div class="glass-card p-3 mb-2 border-0" style="background: rgba(255,255,255,0.05)">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <div class="fw-bold"><span class="status-dot ${statusClass}"></span> ${u.name}</div>
                            <small class="text-white-50">${diffDays > 0 ? diffDays + ' days left' : 'Expired'}</small>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-link text-white btn-sm" data-bs-toggle="dropdown"><i class="fas fa-ellipsis-v"></i></button>
                            <ul class="dropdown-menu dropdown-menu-dark">
                                <li><a class="dropdown-item" href="#" onclick="editUser('${u.id}')"><i class="fas fa-edit me-2"></i> Edit</a></li>
                                <li><a class="dropdown-item text-danger" href="#" onclick="deleteUser('${u.id}')"><i class="fas fa-trash me-2"></i> Delete</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="progress mb-1">
                        <div class="progress-bar" style="width: ${percent}%"></div>
                    </div>
                    <div class="d-flex justify-content-between x-small text-white-50" style="font-size: 10px;">
                        <span>DATA: ${u.gbLimit || 50} GB</span>
                        <span>${u.expiry}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function saveUser() {
        const editId = document.getElementById('editId').value;
        const name = document.getElementById('username').value;
        const days = document.getElementById('days').value;
        const gb = document.getElementById('gb').value;
        
        if(!name) return alert("Name please");
        
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "Syncing...";

        try {
            const res = await fetch(API_URL);
            const fileData = await res.json();
            let users = JSON.parse(atob(fileData.content));

            const expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + parseInt(days));

            if(editId) {
                const idx = users.findIndex(u => u.id == editId);
                users[idx] = { ...users[idx], name, expiry: expiryDate.toISOString().split('T')[0], dayCount: days, gbLimit: gb };
            } else {
                users.push({ id: Date.now(), name, token: crypto.randomUUID(), expiry: expiryDate.toISOString().split('T')[0], dayCount: days, gbLimit: gb });
            }

            await fetch(API_URL, {
                method: "PUT",
                body: JSON.stringify({ content: btoa(JSON.stringify(users, null, 2)), sha: fileData.sha })
            });
            location.reload();
        } catch (e) { alert(e.message); btn.disabled = false; }
    }

    function editUser(id) {
        const u = allUsers.find(user => user.id == id);
        document.getElementById('editId').value = u.id;
        document.getElementById('username').value = u.name;
        document.getElementById('days').value = u.dayCount || 30;
        document.getElementById('gb').value = u.gbLimit || 50;
        document.getElementById('formTitle').innerText = "EDIT CLIENT: " + u.name;
        document.getElementById('cancelBtn').classList.remove('d-none');
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('username').value = "";
        document.getElementById('formTitle').innerText = "CREATE NEW CLIENT";
        document.getElementById('cancelBtn').classList.add('d-none');
    }

    async function deleteUser(id) {
        if(!confirm("Delete this user?")) return;
        try {
            const res = await fetch(API_URL);
            const fileData = await res.json();
            let users = JSON.parse(atob(fileData.content)).filter(u => u.id != id);
            await fetch(API_URL, {
                method: "PUT",
                body: JSON.stringify({ content: btoa(JSON.stringify(users, null, 2)), sha: fileData.sha })
            });
            location.reload();
        } catch (e) { alert(e.message); }
    }

    function showSettings() { new bootstrap.Modal('#settingsModal').show(); }
    function logout() { sessionStorage.clear(); location.reload(); }
    fetchUsers();
</script>
</body>
</html>
