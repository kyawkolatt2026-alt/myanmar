<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PANEL</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header { background: linear-gradient(to right, #6a11cb, #2575fc); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .stats { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-item { text-align: center; }
        .search-container { padding: 20px; text-align: center; }
        input[type="text"] { width: 80%; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
        .add-btn { background-color: #6a11cb; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 90%; display: block; margin: 0 auto; }
        .user-card { background: white; margin: 15px; padding: 15px; border-radius: 10px; border: 1px solid #28a745; position: relative; }
        .status-tag { color: #28a745; position: absolute; top: 10px; right: 10px; font-size: 12px; }
        .info-row { margin: 5px 0; font-size: 14px; color: #555; }
        .progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-top: 10px; }
        .progress-fill { height: 100%; background: #28a745; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <h3>AGE VIP PANEL For VIP Users</h3>
    <div class="stats">
        <div class="stat-item"><div id="total-users">0</div>TOTAL</div>
        <div class="stat-item"><div style="color: #00ff00;" id="active-users">0</div>ACTIVE</div>
        <div class="stat-item"><div style="color: #ffcc00;">0</div>INACTIVE</div>
    </div>
</div>

<div class="search-container">
    <input type="text" placeholder="Search by ID or Username...">
</div>

<button class="add-btn" onclick="addNewUser()">+ Add New User</button>

<div id="user-list">
    </div>

<script>
    const PANEL_URL = "https://your-domain.com:2053"; // သင့် Panel URL ပြောင်းရန်

    // 3X-UI မှ User များ ခေါ်ယူပြသရန် Function
    async function fetchUsers() {
        try {
            // မှတ်ချက်- ဤနေရာတွင် API Login အရင်ဝင်ရန် လိုအပ်သည်
            const response = await fetch(`${PANEL_URL}/panel/api/inbounds/list`, { method: 'GET' });
            const data = await response.json();
            
            if (data.success) {
                renderUsers(data.obj[0].clientStats); // ပထမဆုံး Inbound မှ user များယူခြင်း
            }
        } catch (e) {
            console.log("API ချိတ်ဆက်မှု လိုအပ်နေသေးသည်");
        }
    }

    function renderUsers(users) {
        const container = document.getElementById('user-list');
        container.innerHTML = '';
        users.forEach(user => {
            container.innerHTML += `
                <div class="user-card">
                    <span class="status-online">● ${user.email}</span>
                    <span class="status-tag">Online</span>
                    <div class="info-row">🔑 Token ID: ${user.id}</div>
                    <div class="info-row">📅 Expiry: ${new Date(user.expiryTime).toLocaleDateString()}</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <div style="text-align:right; font-size:10px; color:#28a745;">100%</div>
                </div>
            `;
        });
    }

    // စမ်းသပ်ရန်အတွက် function ခေါ်ထားခြင်း
    fetchUsers();
</script>

</body>
</html>
