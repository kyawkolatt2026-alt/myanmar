<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: none; }
        .btn-custom { background-color: #00bcd4; color: white; border-radius: 10px; padding: 12px; border: none; }
        .btn-custom:hover { background-color: #0097a7; color: white; }
        .btn-logout { background-color: #ff4081; color: white; border-radius: 8px; font-size: 0.8rem; border: none; padding: 5px 15px; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0 fw-bold text-dark">AGE VPN Admin</h2>
            <span class="status-badge bg-success text-white" id="connectionStatus">● Connected</span>
        </div>
        <button onclick="logout()" class="btn-logout fw-bold">Logout</button>
    </div>

    <div class="row g-3 mb-4 text-center text-white">
        <div class="col-4">
            <div class="p-3 rounded-4" style="background: #00b0ff;"><small>CLIENTS</small><br><strong id="clientCount">0</strong></div>
        </div>
        <div class="col-4">
            <div class="p-3 rounded-4" style="background: #ff4081;"><small>LIMIT</small><br><strong>1 Device</strong></div>
        </div>
        <div class="col-4">
            <div class="p-3 rounded-4" style="background: #ffa000;"><small>SERVER IP</small><br><small>157.85.103.207</small></div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h5 class="mb-3 text-primary border-start border-4 border-primary ps-2 fw-bold">Create VIP Account</h5>
        
        <div class="mb-3">
            <label class="form-label fw-bold small">USERNAME</label>
            <input type="text" id="username" class="form-control form-control-lg" placeholder="eg. kyawkyaw">
        </div>

        <div class="row mb-3">
            <div class="col-6">
                <label class="form-label fw-bold small">VALID DAYS</label>
                <input type="number" id="validDays" class="form-control" value="30">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold small">DATA LIMIT (GB)</label>
                <input type="number" id="gbLimit" class="form-control" value="50">
            </div>
        </div>

        <button onclick="saveUser()" id="saveBtn" class="btn btn-custom w-100 fw-bold shadow-sm">Save Now</button>
    </div>

    <div class="card p-3">
        <h6 class="text-muted mb-3 fw-bold small">CLIENT LIST</h6>
        <div id="userList" class="list-group list-group-flush">
            <div class="text-center py-3 text-muted">Loading users...</div>
        </div>
    </div>
</div>

<script>
    // Worker URL (သင့်ရဲ့ လက်ရှိ Worker Link)
    const API_URL = "https://jolly-mouse-e734.kyawkolatt2026-alt.workers.dev";

    // Logout Function (Login Page ဆီသို့ လမ်းကြောင်းမှန်အောင် ပြင်ထားသည်)
    function logout() {
        if(confirm("Logout လုပ်မှာ သေချာပါသလား?")) {
            // GitHub Pages ရဲ့ login.html လမ်းကြောင်းအပြည့်အစုံ
            window.location.href = "https://kyawkolatt2026-alt.github.io/myanmar/login.html"; 
        }
    }

    // Fetch Users from GitHub via Cloudflare Worker
    async function fetchUsers() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("Connection Error");
            const data = await res.json();
            const users = JSON.parse(atob(data.content));
            displayUsers(users);
        } catch (err) { 
            console.error("Fetch Error:", err);
            document.getElementById('userList').innerHTML = `<div class="text-danger text-center py-2">Error: Failed to fetch data</div>`;
            document.getElementById('connectionStatus').classList.replace('bg-success', 'bg-danger');
            document.getElementById('connectionStatus').innerText = "● Disconnected";
        }
    }

    function displayUsers(users) {
        const list = document.getElementById('userList');
        document.getElementById('clientCount').innerText = users.length;
        
        if (users.length === 0) {
            list.innerHTML = `<div class="text-center py-3 text-muted">No users found.</div>`;
            return;
        }

        list.innerHTML = users.reverse().map(u => `
            <div class="list-group-item py-3 border-bottom">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="fw-bold text-dark">${u.name.toUpperCase()}</div>
                    <span class="badge bg-light text-dark border">${u.gbLimit || 50} GB</span>
                </div>
                <div class="small text-muted mt-1">Expiry: ${u.expiry}</div>
            </div>
        `).join('');
    }

    // Save New User
    async function saveUser() {
        const name = document.getElementById('username').value.trim();
        const days = document.getElementById('validDays').value;
        const gbLimit = document.getElementById('gbLimit').value;
        const saveBtn = document.getElementById('saveBtn');

        if (!name) return alert("ကျေးဇူးပြု၍ Username ထည့်ပေးပါဗျ။");

        saveBtn.disabled = true;
        saveBtn.innerText = "Processing...";

        try {
            const res = await fetch(API_URL);
            const fileData = await res.json();
            let users = JSON.parse(atob(fileData.content));

            // ရက်ပေါင်းတွက်ချက်ခြင်း
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + parseInt(days));
            const expiryStr = expiry.toISOString().split('T')[0];

            // အချက်အလက်အသစ် ထည့်သွင်းခြင်း
            users.push({
                id: Date.now(),
                name: name,
                token: crypto.randomUUID(), // Auto-generate UUID
                expiry: expiryStr,
                dayCount: days,
                gbLimit: gbLimit
            });

            // Cloudflare Worker မှတဆင့် GitHub သို့ ပြန်ပို့ခြင်း
            const updateRes = await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: btoa(JSON.stringify(users, null, 2)),
                    sha: fileData.sha
                })
            });

            if (updateRes.ok) {
                alert("အကောင့်အသစ်ကို အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။");
                location.reload();
            } else {
                throw new Error("Update failed");
            }
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "Save Now";
        }
    }

    // စတင်ချိန်တွင် User များအား ဆွဲထုတ်ရန်
    fetchUsers();
</script>

</body>
</html>
