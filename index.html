<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VIP PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .vip-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .user-card { border: 2px solid #22c55e; transition: transform 0.2s; }
        .user-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="vip-gradient text-white p-6 rounded-b-3xl shadow-lg text-center relative">
        <h1 class="text-xl font-bold">AGE VIP PANEL</h1>
        <p class="text-sm opacity-80">For VIP Users</p>
        
        <div class="flex justify-around mt-6">
            <div><p class="text-2xl font-bold" id="total-count">0</p><p class="text-xs">TOTAL</p></div>
            <div><p class="text-2xl font-bold text-green-400" id="active-count">0</p><p class="text-xs">ACTIVE</p></div>
            <div><p class="text-2xl font-bold text-yellow-400">0</p><p class="text-xs">INACTIVE</p></div>
            <div><p class="text-2xl font-bold text-red-400">0</p><p class="text-xs">OFFLINE</p></div>
        </div>
    </div>

    <div class="p-4 space-y-4">
        <input type="text" id="searchInput" placeholder="Search by ID or Username..." 
               class="w-full p-3 rounded-full border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
        
        <button class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-purple-700">
            <i class="fas fa-plus-circle mr-2"></i> Add New User
        </button>
    </div>

    <div id="userList" class="p-4 space-y-4 pb-20">
        </div>

    <script>
        // vip.json ဖိုင်ထဲက data ကို လှမ်းဖတ်ခြင်း
        async function loadUsers() {
            try {
                const response = await fetch('vip.json');
                const users = await response.json();
                displayUsers(users);
            } catch (error) {
                console.error("Error loading users:", error);
            }
        }

        function displayUsers(users) {
            const container = document.getElementById('user-list');
            document.getElementById('total-count').innerText = users.length;
            document.getElementById('active-count').innerText = users.length;

            const html = users.map(user => `
                <div class="user-card bg-white p-4 rounded-2xl shadow-sm relative">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-green-600 font-bold text-lg">● ${user.username}</h3>
                        <span class="text-green-500 text-xs font-bold">Online</span>
                    </div>
                    <div class="space-y-1 text-sm text-gray-600">
                        <p><i class="fas fa-key w-6"></i> Token ID: <span class="text-gray-400">${user.token_id || 'null'}</span></p>
                        <p><i class="fas fa-user w-6"></i> Username: ${user.username}</p>
                        <p><i class="fas fa-calendar w-6"></i> Expiry: ${user.expiry}</p>
                        <p><i class="fas fa-clock w-6"></i> Remaining: <span class="text-blue-500 font-bold">${calculateRemaining(user.expiry)} days</span></p>
                    </div>
                    <div class="mt-3">
                        <p class="text-[10px] text-gray-400 mb-1">Subscription Progress <span class="float-right text-green-500">100%</span></p>
                        <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-green-500 h-full w-full"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('userList').innerHTML = html;
        }

        function calculateRemaining(expiryDate) {
            const diff = new Date(expiryDate) - new Date();
            return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
        }

        loadUsers();
    </script>
</body>
</html>
