<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN - Device Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); --bg: #f4f7f6; }
        body, html { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        #loginPage { height: 100vh; background: var(--p-grad); display: flex; justify-content: center; align-items: center; position: fixed; width: 100%; z-index: 1000; }
        .login-box { width: 300px; text-align: center; color: white; padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .input-group { background: white; border-radius: 50px; padding: 10px 20px; margin-bottom: 15px; display: flex; align-items: center; }
        .input-group input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 16px; }
        .login-btn { background: white; color: #3a7bd5; border: none; width: 100%; padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        #mainDashboard { display: none; padding: 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 90%; padding: 10px; border-radius: 10px; border: 1px solid #eee; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f8f8f8; }
        .sync-label { font-size: 12px; font-weight: bold; text-align: center; display: block; margin-bottom: 10px; }
        .btn-icon { cursor: pointer; padding: 8px; font-size: 18px; margin-right: 5px; transition: 0.2s; }
        .btn-copy { color: #28a745; }
        .btn-edit { color: #3a7bd5; }
        .btn-del { color: #ff2d55; }
        .btn-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h2>AGE VPN</h2> 
            <div class="input-group"><input type="text" id="adminU" placeholder="Admin"></div>
            <div class="input-group"><input type="password" id="adminP" placeholder="Password"></div>
            <button class="login-btn" onclick="login()">Enter Panel</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <h3>Device Manager</h3>
            <button onclick="location.reload()" style="border:none; background:#ff2d55; color:white; padding:8px 15px; border-radius:10px; cursor:pointer;">Logout</button>
        </div>

        <div id="statusLabel" class="sync-label">Checking Cloud...</div>

        <div class="card">
            <h4 id="formTitle">+ Add/Edit Device</h4>
            <div class="form-grid">
                <input type="hidden" id="editId">
                <div><label>Name</label><input type="text" id="username"></div>
                <div><label>Days</label><input type="number" id="days" value="30"></div>
                <div style="grid-column: span 2;"><label>Token ID</label><input type="text" id="userToken" value="null" style="width: 95%;"></div>
            </div>
            <button id="submitBtn" onclick="saveUser()" style="width:100%; margin-top:15px; background:#3a7bd5; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">Save Device</button>
            <button id="cancelBtn" onclick="resetForm()" style="display:none; width:100%; margin-top:5px; background:#888; color:white; border:none; padding:8px; border-radius:10px;">Cancel</button>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th>Name/Token</th><th>Expiry</th><th>Actions</th></tr></thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

<script>
    const API_URL = "https://jolly-mouse-e734.kyawkolatt2026.workers.dev";
    let users = [];
    let currentSha = "";

    function login() {
        if(document.getElementById('adminU').value === "admin" && document.getElementById('adminP').value === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            fetchData();
        } else { alert("Login Failed!"); }
    }

    async function fetchData() {
        updateLabel("🔄 Syncing...", "orange");
        try {
            const res = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await res.json();
            currentSha = data.sha;
            users = JSON.parse(atob(data.content));
            render();
            updateLabel("✅ Cloud Synced", "green");
        } catch (e) { updateLabel("❌ Cloud Error", "red"); }
    }

    function render() {
        document.getElementById('userTable').innerHTML = users.map(u => `
            <tr>
                <td><strong>${u.name}</strong><br><small style="color:#888">${u.token}</small></td>
                <td><small>${u.expiry}</small></td>
                <td>
                    <i class="fas fa-copy btn-icon btn-copy" title="Copy V2Box Link" onclick="copyV2Box('${u.name}', '${u.token}')"></i>
                    <i class="fas fa-edit btn-icon btn-edit" onclick="editUser(${u.id})"></i>
                    <i class="fas fa-trash btn-icon btn-del" onclick="delUser(${u.id})"></i>
                </td>
            </tr>`).join('');
    }

    function copyV2Box(name, token) {
        const serverIp = "157.85.103.207";
        const vlessLink = `vless://${token}@${serverIp}:443?encryption=none&security=tls&type=grpc&serviceName=grpc&sni=speedtest.net#${encodeURIComponent(name)}`;
        
        const el = document.createElement('textarea');
        el.value = vlessLink;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Config Copied! Paste in V2Box.");
    }

    async function saveUser() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('username').value;
        const days = document.getElementById('days').value;
        const uTok = document.getElementById('userToken').value;
        if(!name) return alert("Name required!");
        if(id) {
            const idx = users.findIndex(u => u.id == id);
            users[idx].name = name;
            users[idx].token = uTok;
        } else {
            const exp = new Date();
            exp.setDate(exp.getDate() + parseInt(days));
            users.push({ id: Date.now(), name, token: uTok, expiry: exp.toISOString().split('T')[0] });
        }
        await sync();
        resetForm();
    }

    async function sync() {
        updateLabel("💾 Saving...", "orange");
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(users, null, 2))));
        try {
            const res = await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update Data", content, sha: currentSha })
            });
            const d = await res.json();
            currentSha = d.content.sha;
            render();
            updateLabel("✅ Cloud Synced", "green");
        } catch (e) { updateLabel("❌ Sync Failed!", "red"); fetchData(); }
    }

    function editUser(id) {
        const u = users.find(x => x.id == id);
        document.getElementById('editId').value = u.id;
        document.getElementById('username').value = u.name;
        document.getElementById('userToken').value = u.token;
        document.getElementById('formTitle').innerText = "📝 Edit Device";
        document.getElementById('submitBtn').innerText = "Update Device";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('username').value = "";
        document.getElementById('userToken').value = "null";
        document.getElementById('formTitle').innerText = "+ Add/Edit Device";
        document.getElementById('submitBtn').innerText = "Save Device";
        document.getElementById('cancelBtn').style.display = "none";
    }

    async function delUser(id) {
        if(!confirm("Delete?")) return;
        users = users.filter(x => x.id !== id);
        await sync();
    }

    function updateLabel(t, c) {
        const l = document.getElementById('statusLabel');
        l.innerText = t; l.style.color = c;
    }
</script>
</body>
                                                                                                                                                                      </html>
