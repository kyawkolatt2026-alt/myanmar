<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --text: #e94560; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; }
        .glass-card { background: var(--card); border-radius: 15px; border: 1px solid var(--accent); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-vpn { background: var(--text); border: none; color: white; border-radius: 10px; font-weight: bold; }
        .form-control { background: #0f3460; border: none; color: white; border-radius: 8px; }
        .form-control:focus { background: #0f3460; color: white; box-shadow: 0 0 5px var(--text); }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="fas fa-shield-alt text-info me-2"></i>AGE VPN</h4>
        <button onclick="logout()" class="btn btn-sm btn-danger rounded-pill">Logout</button>
    </div>

    <div class="glass-card mb-4">
        <h6 class="small fw-bold mb-3 text-info">CREATE NEW CLIENT</h6>
        <input type="hidden" id="editId">
        <input type="text" id="username" class="form-control mb-3" placeholder="Client Name">
        <div class="row g-2 mb-3">
            <div class="col-6"><input type="number" id="days" class="form-control" value="30" placeholder="Days"></div>
            <div class="col-6"><input type="number" id="gb" class="form-control" value="50" placeholder="GB Limit"></div>
        </div>
        <button onclick="saveUser()" id="saveBtn" class="btn btn-vpn w-100 py-2">Save Now</button>
    </div>

    <div class="glass-card">
        <h6 class="small fw-bold mb-3 text-info">CLIENT LIST</h6>
        <div id="userList"><div class="text-center py-3"><div class="spinner-border text-info"></div></div></div>
    </div>
</div>

<script>
    // Screenshot ပါ Domain အတိုင်း အတိအကျ ပြင်ဆင်ထားသည်
    const API_URL = "https://jolly-mouse-e734.kyawkolatt2026-alt.workers.dev";
    let allUsers = [];

    async function fetchUsers() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('Worker Error: ' + res.status);
            const data = await res.json();
            allUsers = JSON.parse(atob(data.content));
            renderUsers();
        } catch (e) {
            document.getElementById('userList').innerHTML = `<div class='text-center text-danger small'>Loading Error: ${e.message}</div>`;
        }
    }

    function renderUsers() {
        const list = document.getElementById('userList');
        if (allUsers.length === 0) { list.innerHTML = "<div class='text-center py-3 opacity-50'>No users found.</div>"; return; }
        list.innerHTML = allUsers.slice().reverse().map(u => `
            <div class="p-2 mb-2 rounded border border-secondary d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold text-uppercase" style="font-size: 0.9rem;">${u.name}</div>
                    <div style="font-size: 0.7rem;" class="text-info">${u.gbLimit || 50}GB | ${u.expiry}</div>
                </div>
                <div>
                    <button class="btn btn-sm text-info" onclick="editUser('${u.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm text-danger" onclick="deleteUser('${u.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    async function saveUser() {
        const name = document.getElementById('username').value.trim();
        const days = document.getElementById('days').value;
        const gb = document.getElementById('gb').value;
        const editId = document.getElementById('editId').value;
        if(!name) return alert("Enter name!");

        document.getElementById('saveBtn').disabled = true;
        document.getElementById('saveBtn').innerText = "Syncing..."; //

        try {
            const res = await fetch(API_URL);
            const fileData = await res.json();
            let users = JSON.parse(atob(fileData.content));
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + parseInt(days));

            if(editId) {
                const idx = users.findIndex(u => u.id == editId);
                users[idx] = { ...users[idx], name, expiry: expiry.toISOString().split('T')[0], dayCount: days, gbLimit: gb };
            } else {
                users.push({ id: Date.now().toString(), name, expiry: expiry.toISOString().split('T')[0], dayCount: days, gbLimit: gb });
            }

            await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: btoa(JSON.stringify(users, null, 2)), sha: fileData.sha })
            });
            location.reload();
        } catch (e) { alert(e.message); document.getElementById('saveBtn').disabled = false; }
    }

    function editUser(id) {
        const u = allUsers.find(user => user.id == id);
        document.getElementById('editId').value = u.id;
        document.getElementById('username').value = u.name;
        document.getElementById('days').value = u.dayCount || 30;
        document.getElementById('gb').value = u.gbLimit || 50;
    }

    async function deleteUser(id) {
        if(!confirm("Delete?")) return;
        try {
            const res = await fetch(API_URL);
            const fileData = await res.json();
            let users = JSON.parse(atob(fileData.content)).filter(u => u.id != id);
            await fetch(API_URL, { method: "PUT", body: JSON.stringify({ content: btoa(JSON.stringify(users, null, 2)), sha: fileData.sha }) });
            location.reload();
        } catch (e) { alert(e.message); }
    }

    function logout() { localStorage.removeItem("age_vpn_auth"); window.location.href = "login.html"; }
    if(localStorage.getItem("age_vpn_auth") !== "granted") window.location.href="login.html";
    fetchUsers();
</script>
</body>
</html>
