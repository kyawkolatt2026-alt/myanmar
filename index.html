<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN - Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --white: #ffffff; --bg: #f4f7f6; --cyan: #00bcd4;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        
        /* Login Section */
        #loginPage { height: 100%; background: var(--primary-grad); display: flex; justify-content: center; align-items: center; }
        .login-box { width: 350px; text-align: center; color: white; padding: 40px; border-radius: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .input-group { background: white; border-radius: 50px; padding: 12px 25px; margin-bottom: 15px; display: flex; align-items: center; }
        .input-group input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 16px; }
        .login-btn { background: white; color: #3a7bd5; border: none; width: 100%; padding: 14px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* Dashboard Section */
        #mainDashboard { display: none; padding: 25px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 15px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: center; margin-bottom: 20px; }
        .form-grid input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #888; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f8f8f8; font-size: 14px; }
        .del-btn { color: #ff2d55; background: none; border: none; cursor: pointer; font-size: 18px; }
        .sync-text { font-size: 12px; color: #00bcd4; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <i class="fas fa-shield-alt fa-3x" style="margin-bottom:20px;"></i>
            <h2>AGE VPN ADMIN</h2>
            <div class="input-group">
                <i class="fas fa-lock" style="color:#ccc;"></i>
                <input type="password" id="adminPass" placeholder="Password (1234)">
            </div>
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <h2>Dashboard</h2>
            <span id="syncStatus" class="sync-text">Cloud Synced ✅</span>
        </div>

        <div class="stat-grid">
            <div class="stat-card" style="background: linear-gradient(45deg, #00d2ff, #3a7bd5);">
                <small>Total Users</small><br><b id="totalU" style="font-size: 24px;">0</b>
            </div>
            <div class="stat-card" style="background: linear-gradient(45deg, #ff9a9e, #fad0c4);">
                <small>Active Now</small><br><b style="font-size: 24px;">Online</b>
            </div>
        </div>

        <div class="card">
            <h3>Add New User</h3>
            <div class="form-grid">
                <input type="text" id="newU" placeholder="User Name">
                <input type="number" id="newD" placeholder="Days">
                <button onclick="addUser()" style="background:var(--primary-grad); color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer;">ADD USER</button>
            </div>

            <table>
                <thead>
                    <tr><th>USER NAME</th><th>EXPIRY DATE</th><th>ACTION</th></tr>
                </thead>
                <tbody id="userList">
                    <tr><td colspan="3" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    const GITHUB_TOKEN = "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";
    const OWNER = "kyawkolatt2026-alt";
    const REPO = "myanmar";
    const FILE = "vip.json";

    let users = [];
    let currentSha = "";

    function checkLogin() {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            loadData();
        } else { alert("Wrong Password!"); }
    }

    async function loadData() {
        updateStatus("Syncing...", "orange");
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            const data = await res.json();
            currentSha = data.sha;
            users = JSON.parse(atob(data.content));
            render();
            updateStatus("Cloud Synced ✅", "#00bcd4");
        } catch (e) { updateStatus("Sync Error ❌", "red"); }
    }

    async function addUser() {
        const name = document.getElementById('newU').value;
        const days = document.getElementById('newD').value;
        if(!name || !days) return;

        updateStatus("Saving...", "orange");
        const exp = new Date();
        exp.setDate(exp.getDate() + parseInt(days));
        
        users.push({ id: Date.now(), name, expiry: exp.toISOString().split('T')[0] });
        await sync();
        document.getElementById('newU').value = "";
        document.getElementById('newD').value = "";
    }

    async function deleteUser(id) {
        if(!confirm("Delete this user?")) return;
        updateStatus("Deleting...", "orange");
        users = users.filter(u => u.id !== id);
        await sync();
    }

    async function sync() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(users, null, 2))));
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
            method: "PUT",
            headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update", content, sha: currentSha })
        });
        const result = await res.json();
        currentSha = result.content.sha;
        render();
        updateStatus("Cloud Synced ✅", "#00bcd4");
    }

    function render() {
        document.getElementById('totalU').innerText = users.length;
        document.getElementById('userList').innerHTML = users.map(u => `
            <tr>
                <td><b>${u.name}</b></td>
                <td>${u.expiry}</td>
                <td><button class="del-btn" onclick="deleteUser(${u.id})"><i class="fas fa-trash-alt"></i></button></td>
            </tr>
        `).join('');
    }

    function updateStatus(txt, col) {
        const s = document.getElementById('syncStatus');
        s.innerText = txt; s.style.color = col;
    }
</script>
</body>
    </html>
