<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN - Cloud Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2, h3 { color: #333; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .user-list { margin-top: 20px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 10px; }
        .user-info b { color: #3a7bd5; font-size: 16px; }
        .user-info div { font-size: 12px; color: #888; }
        .del-btn { background: #ff4d4d; width: auto; padding: 8px 15px; font-size: 13px; }
        .status { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .loading { color: #f39c12; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="card">
        <h2>AGE VPN ADMIN</h2>
        <input type="password" id="adminPass" placeholder="ရိုက်ထည့်ပါ (1234)">
        <button onclick="checkLogin()">Login ဝင်မည်</button>
    </div>

    <div id="adminSection" class="card" style="display:none;">
        <h3>User စာရင်းသွင်းရန်</h3>
        <div id="syncStatus" class="status">Cloud နှင့် ချိတ်ဆက်ပြီးပါပြီ ✅</div>
        
        <input type="text" id="newUsername" placeholder="User အမည်">
        <input type="number" id="expiryDays" placeholder="အသုံးပြုမည့်ရက် (ဥပမာ - 30)">
        <button onclick="addUser()">+ အသစ်ထည့်မည်</button>

        <div class="user-list" id="userDisplay">
            <div style="text-align:center; padding: 20px;">Data များ ဆွဲယူနေသည်...</div>
        </div>
    </div>
</div>

<script>
    // --- GitHub Configuration ---
    const GITHUB_TOKEN = "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";
    const REPO_OWNER = "kyawkolatt2026-alt";
    const REPO_NAME = "myanmar";
    const FILE_PATH = "vip.json";
    // ----------------------------

    let users = [];
    let currentSha = "";

    function checkLogin() {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            loadData();
        } else { alert("Password မှားယွင်းနေပါသည်။"); }
    }

    async function loadData() {
        showStatus("Data များ ဆွဲယူနေသည်...", "loading");
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            const data = await response.json();
            currentSha = data.sha;
            users = JSON.parse(atob(data.content));
            renderUsers();
            showStatus("Cloud နှင့် ချိတ်ဆက်ပြီးပါပြီ ✅", "success");
        } catch (error) {
            showStatus("Data ဆွဲယူ၍မရပါ (Error)", "loading");
        }
    }

    async function addUser() {
        const name = document.getElementById('newUsername').value;
        const days = document.getElementById('expiryDays').value;
        if(!name || !days) return alert("အချက်အလက် အကုန်ဖြည့်ပါ။");

        showStatus("GitHub သို့ သိမ်းဆည်းနေသည်...", "loading");
        
        const expireDate = new Date();
        expireDate.setDate(expireDate.getDate() + parseInt(days));
        
        const newUser = {
            id: Date.now(),
            name: name,
            expiry: expireDate.toISOString().split('T')[0]
        };

        users.push(newUser);
        await syncToGitHub();
        
        document.getElementById('newUsername').value = "";
        document.getElementById('expiryDays').value = "";
    }

    async function deleteUser(id) {
        if(!confirm("ဤ User ကို ဖျက်မှာ သေချာပါသလား?")) return;
        showStatus("ဖျက်သိမ်းနေသည်...", "loading");
        users = users.filter(user => user.id !== id);
        await syncToGitHub();
    }

    async function syncToGitHub() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(users, null, 2))));
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update VIP Data via Panel",
                    content: content,
                    sha: currentSha
                })
            });
            const result = await response.json();
            currentSha = result.content.sha;
            renderUsers();
            showStatus("အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ ✅", "success");
        } catch (error) {
            alert("GitHub သို့ သိမ်းဆည်း၍မရပါ။");
        }
    }

    function renderUsers() {
        const display = document.getElementById('userDisplay');
        if(users.length === 0) {
            display.innerHTML = "<div style='text-align:center; padding:20px; color:#888;'>User မရှိသေးပါ။</div>";
            return;
        }
        display.innerHTML = users.map(user => `
            <div class="user-item">
                <div class="user-info">
                    <b>${user.name}</b>
                    <div>Expire: ${user.expiry}</div>
                </div>
                <button class="del-btn" onclick="deleteUser(${user.id})">ဖျက်မည်</button>
            </div>
        `).join('');
    }

    function showStatus(text, className) {
        const statusEl = document.getElementById('syncStatus');
        statusEl.innerText = text;
        statusEl.className = "status " + className;
    }
</script>

</body>
    </html>
