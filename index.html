<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN - Admin System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --white: #ffffff; --bg: #f4f7f6; --cyan: #00bcd4;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }

        /* Login Section */
        #loginPage { height: 100%; background: var(--primary-grad); display: flex; justify-content: center; align-items: center; position: fixed; width: 100%; z-index: 1000; }
        .login-box { width: 85%; max-width: 350px; text-align: center; color: white; padding: 30px; border-radius: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .input-group { background: white; border-radius: 50px; padding: 12px 20px; margin-bottom: 15px; display: flex; align-items: center; }
        .input-group input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 16px; color: #333; }
        .login-btn { background: white; color: #3a7bd5; border: none; width: 100%; padding: 14px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Dashboard Section */
        #mainDashboard { display: none; padding: 15px; max-width: 1000px; margin: auto; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .sync-status { text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 15px; padding: 5px; border-radius: 8px; }

        /* Stats Grid */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { padding: 15px; border-radius: 15px; color: white; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 12px; opacity: 0.9; }
        .stat-card h2 { margin: 5px 0 0; font-size: 18px; }

        /* Form Card */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 5px; }
        .form-group input { padding: 12px; border-radius: 10px; border: 1px solid #eee; background: #fafafa; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--cyan); }
        
        .submit-btn { background: var(--cyan); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; height: 43px; }

        /* Table Section */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 12px; border-bottom: 2px solid #f8f8f8; }
        td { padding: 12px; border-bottom: 1px solid #f8f8f8; font-size: 14px; }
        
        .copy-link { color: var(--cyan); text-decoration: none; font-size: 12px; font-weight: bold; border: 1.5px solid var(--cyan); padding: 4px 8px; border-radius: 6px; display: inline-block; }
        .action-btn { border: none; background: none; cursor: pointer; font-size: 16px; margin-right: 8px; transition: 0.2s; }
        .edit-btn { color: #3a7bd5; }
        .del-btn { color: #ff2d55; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .stat-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; gap: 12px; }
            .submit-btn { width: 100%; margin-top: 10px; }
            .nav-bar h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-box">
            <h1 style="margin-bottom:25px;">AGE VPN LOGIN</h1>
            <div class="input-group"><i class="fas fa-user" style="color:#3a7bd5"></i><input type="text" id="adminUser" placeholder="Username"></div>
            <div class="input-group"><i class="fas fa-lock" style="color:#3a7bd5"></i><input type="password" id="adminPass" placeholder="Password"></div>
            <button class="login-btn" onclick="checkLogin()">Enter Panel</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="nav-bar">
            <h2>AGE VPN Admin</h2>
            <button onclick="location.reload()" style="background:#ff2d55; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:bold; font-size:12px;">Logout</button>
        </div>

        <div id="syncStatus" class="sync-status">Checking Cloud...</div>

        <div class="stat-grid">
            <div class="stat-card" style="background:var(--primary-grad)"><h3>Total Clients</h3><h2 id="totalU">0</h2></div>
            <div class="stat-card" style="background:linear-gradient(135deg,#ff5e7d,#ff2d55)"><h3>IP Limit</h3><h2>1 Device</h2></div>
            <div class="stat-card" style="background:linear-gradient(135deg,#ffb347,#ff9500)"><h3>Server IP</h3><h2 style="font-size:14px;">157.85.103.207</h2></div>
        </div>

        <div class="card">
            <h3 id="formTitle" style="margin:0 0 15px 0; color:#3a7bd5; font-size:16px;">+ Create VIP User</h3>
            <div class="form-grid">
                <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="eg. kyawkyaw"></div>
                <div class="form-group"><label>Days</label><input type="number" id="days" value="30"></div>
                <div class="form-group"><label>Token</label><input type="text" id="token" value="null"></div>
                <input type="hidden" id="editId">
                <button id="submitBtn" class="submit-btn" onclick="saveUser()">Save Account</button>
            </div>
        </div>

        <div class="card table-container">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Token ID</th>
                        <th>Expiry</th>
                        <th>Config</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

<script>
    const API_URL = "https://jolly-mouse-e734.kyawkolatt2026.workers.dev"; 
    const UUID = "f0c5c822-ef5b-431f-85d0-776bec0eaea7";
    const IP = "157.85.103.207";
    let users = [];
    let currentSha = "";

    function checkLogin() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            fetchData();
        } else { alert("Login Failed!"); }
    }

    async function fetchData() {
        updateLabel("🔄 Syncing Cloud Data...", "#ff9500");
        try {
            const res = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await res.json();
            currentSha = data.sha;
            users = JSON.parse(atob(data.content));
            render();
            updateLabel("✅ Cloud Synced", "#4cd137");
        } catch (e) { updateLabel("❌ Cloud Sync Error!", "#ff2d55"); }
    }

    function render() {
        document.getElementById('totalU').innerText = users.length;
        document.getElementById('userTable').innerHTML = users.map(u => {
            const link = `vless://${UUID}@${IP}:80?encryption=none&security=none&type=tcp&headerType=http&host=www.speedtest.net&path=%2F#AGE-${encodeURIComponent(u.name)}`;
            return `
                <tr>
                    <td><strong>${u.name}</strong></td>
                    <td style="color:#888; font-size:11px;">${u.token}</td>
                    <td><span style="color:#3a7bd5; font-weight:bold;">${u.expiry}</span></td>
                    <td><a href="javascript:void(0)" class="copy-link" onclick="navigator.clipboard.writeText('${link}');alert('V2Box Link Copied!')">Copy Config</a></td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editUser(${u.id})"><i class="fas fa-edit"></i></button>
                        <button class="action-btn del-btn" onclick="delUser(${u.id})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
        }).join('');
    }

    async function saveUser() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('username').value;
        const days = document.getElementById('days').value;
        const uTok = document.getElementById('token').value;
        if(!name || !days) return alert("ကျေးဇူးပြု၍ အချက်အလက်ပြည့်စုံစွာဖြည့်ပါ");

        if(id) {
            const idx = users.findIndex(u => u.id == id);
            users[idx].name = name;
            users[idx].token = uTok;
        } else {
            const exp = new Date();
            exp.setDate(exp.getDate() + parseInt(days));
            users.push({ id: Date.now(), name, token: uTok, expiry: exp.toISOString().split('T')[0], dayCount: days });
        }
        await sync();
        resetForm();
    }

    async function sync() {
        updateLabel("💾 Saving to Cloud...", "#ff9500");
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(users, null, 2))));
        try {
            const res = await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update DB", content, sha: currentSha })
            });
            const d = await res.json();
            currentSha = d.content.sha;
            render();
            updateLabel("✅ Cloud Saved Successfully", "#4cd137");
        } catch (e) { alert("Sync Error!"); fetchData(); }
    }

    function editUser(id) {
        const u = users.find(x => x.id == id);
        document.getElementById('editId').value = u.id;
        document.getElementById('username').value = u.name;
        document.getElementById('token').value = u.token;
        document.getElementById('days').value = u.dayCount || 30;
        document.getElementById('formTitle').innerText = "Editing: " + u.name;
        document.getElementById('submitBtn').innerText = "Update Now";
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('username').value = "";
        document.getElementById('token').value = "null";
        document.getElementById('formTitle').innerText = "+ Create VIP User";
        document.getElementById('submitBtn').innerText = "Save Account";
    }

    async function delUser(id) {
        if(confirm("Are you sure you want to delete?")) { 
            users = users.filter(x => x.id !== id); 
            await sync(); 
        }
    }

    function updateLabel(t, c) {
        const l = document.getElementById('syncStatus');
        l.innerText = t; l.style.color = c;
    }
</script>
</body>
    </html>
