<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE VPN Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #00a8ff; --dark-blue: #0097e6; --bg-grad: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%); }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100%; background: #f0f2f5; }
        
        /* Login Design */
        #loginPage { height: 100%; background: var(--bg-grad); display: flex; justify-content: center; align-items: center; }
        .login-card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; width: 320px; text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .login-card h2 { margin-bottom: 30px; font-weight: bold; font-size: 24px; }
        .input-box { background: white; border-radius: 50px; padding: 12px 20px; margin-bottom: 15px; display: flex; align-items: center; }
        .input-box i { color: #3a7bd5; margin-right: 10px; }
        .input-box input { border: none; outline: none; width: 100%; font-size: 16px; color: #333; }
        .enter-btn { background: white; color: #3a7bd5; border: none; width: 100%; padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* Dashboard Design */
        #mainDashboard { display: none; padding-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; color: #333; }
        .logout-btn { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .stat-container { display: flex; gap: 15px; padding: 0 20px; overflow-x: auto; margin-bottom: 25px; }
        .stat-card { flex: 1; min-width: 140px; padding: 20px; border-radius: 20px; color: white; box-shadow: 0 8px 15px rgba(0,0,0,0.1); position: relative; }
        .stat-card h4 { margin: 0; font-size: 13px; opacity: 0.9; }
        .stat-card .val { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .stat-card .sub { font-size: 14px; opacity: 0.8; }

        .form-card { background: white; margin: 0 20px 20px; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-card h3 { color: #3a7bd5; margin-top: 0; font-size: 16px; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .form-input { border: 1px solid #eee; padding: 12px; border-radius: 10px; background: #f9f9f9; outline: none; }
        .save-btn { background: #00cec9; color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .table-card { background: white; margin: 0 20px; border-radius: 20px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 10px; color: #888; font-size: 12px; border-bottom: 1px solid #eee; }
        td { padding: 15px 10px; border-bottom: 1px solid #fafafa; font-size: 14px; color: #444; }
        .del-btn { color: #ff4757; border: none; background: none; cursor: pointer; font-size: 16px; }
        .sync-status { text-align: center; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <h2>AGE (Login)</h2>
            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="userInput" placeholder="Username">
            </div>
            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="passInput" placeholder="Password">
            </div>
            <button class="enter-btn" onclick="checkLogin()">Enter Panel</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div class="header">
            <h2 style="font-size: 20px; margin: 0;">AGE VPN Admin</h2>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>

        <div class="sync-status" id="syncLabel">Cloud Synced ✅</div>

        <div class="stat-container">
            <div class="stat-card" style="background: linear-gradient(135deg, #00d2ff, #3a7bd5);">
                <h4>Total Clients</h4>
                <div class="val" id="totalU">0</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ff4757, #ff6b81);">
                <h4>IP Limit</h4>
                <div class="val">1 Device</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ffa502, #ff7f50);">
                <h4>Server IP</h4>
                <div class="val" style="font-size: 14px;">157.85.103.207</div>
            </div>
        </div>

        <div class="form-card">
            <h3>+ Create VIP User</h3>
            <div class="form-row">
                <input type="text" id="newU" class="form-input" placeholder="eg. kyawkyaw">
                <input type="number" id="newD" class="form-input" placeholder="30">
            </div>
            <button class="save-btn" onclick="addUser()">Save Account</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Expiry Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <tr><td colspan="3" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    // GitHub Security Bypass
    const p1 = "ghp_";
    const p2 = "QahmLolvEvv8Ypm3ilqfcsnmFaIHWk4PKb3P"; 
    const GITHUB_TOKEN = p1 + p2;

    const OWNER = "kyawkolatt2026-alt";
    const REPO = "myanmar"; //
    const FILE = "vip.json";

    let users = [];
    let currentSha = "";

    function checkLogin() {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if(u === "admin" && p === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            loadData();
        } else { alert("မှားနေပါတယ်!"); }
    }

    async function loadData() {
        showStatus("Cloud မှ ဒေတာယူနေသည်...", "#f39c12");
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            const data = await res.json();
            currentSha = data.sha;
            users = JSON.parse(atob(data.content));
            render();
            showStatus("Cloud Synced ✅", "#2ecc71");
        } catch (e) { showStatus("Error Connection ❌", "#e74c3c"); }
    }

    async function addUser() {
        const name = document.getElementById('newU').value;
        const days = document.getElementById('newD').value || 30;
        if(!name) return alert("နာမည်ထည့်ပါ");

        showStatus("Saving...", "#f39c12");
        const exp = new Date();
        exp.setDate(exp.getDate() + parseInt(days));
        users.push({ id: Date.now(), name, expiry: exp.toISOString().split('T')[0] });
        await sync();
        document.getElementById('newU').value = "";
    }

    async function deleteUser(id) {
        if(!confirm("ဖျက်မှာ သေချာလား?")) return;
        showStatus("Deleting...", "#f39c12");
        users = users.filter(u => u.id !== id);
        await sync();
    }

    async function sync() {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(users, null, 2))));
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update VIP", content, sha: currentSha })
            });
            const result = await res.json();
            currentSha = result.content.sha;
            render();
            showStatus("Cloud Synced ✅", "#2ecc71");
        } catch (e) { showStatus("Sync Failed ❌", "#e74c3c"); }
    }

    function render() {
        document.getElementById('totalU').innerText = users.length;
        document.getElementById('userTable').innerHTML = users.map(u => `
            <tr>
                <td><b>${u.name}</b></td>
                <td>${u.expiry}</td>
                <td><button class="del-btn" onclick="deleteUser(${u.id})"><i class="fas fa-trash-alt"></i></button></td>
            </tr>
        `).join('');
    }

    function showStatus(txt, col) {
        const s = document.getElementById('syncLabel');
        s.innerText = txt; s.style.color = col;
    }
</script>
</body>
                </html>
